<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e26"/>
      <stop offset="55%" stop-color="#1b2350"/>
      <stop offset="100%" stop-color="#34407a"/>
    </linearGradient>
    <linearGradient id="haze3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34407a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4a589c" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky3)"/>
  <rect y="520" width="1600" height="220" fill="url(#haze3)"/>

  <!-- Pixel stars -->
  <g fill="#ffffff">
    <rect x="140" y="120" width="8" height="8"/>
    <rect x="300" y="220" width="6" height="6" opacity="0.8"/>
    <rect x="470" y="90" width="8" height="8"/>
    <rect x="560" y="260" width="6" height="6" opacity="0.7"/>
    <rect x="720" y="150" width="8" height="8"/>
    <rect x="900" y="100" width="6" height="6" opacity="0.8"/>
    <rect x="1010" y="240" width="8" height="8"/>
    <rect x="1180" y="130" width="6" height="6" opacity="0.7"/>
    <rect x="1340" y="200" width="8" height="8"/>
    <rect x="1460" y="110" width="6" height="6" opacity="0.8"/>
    <rect x="220" y="330" width="6" height="6" opacity="0.6"/>
    <rect x="640" y="350" width="6" height="6" opacity="0.6"/>
    <rect x="1100" y="340" width="6" height="6" opacity="0.6"/>
    <rect x="1420" y="320" width="6" height="6" opacity="0.6"/>
    <rect x="380" y="160" width="5" height="5" opacity="0.5"/>
    <rect x="820" y="300" width="5" height="5" opacity="0.5"/>
    <rect x="1260" y="280" width="5" height="5" opacity="0.5"/>
  </g>

  <!-- Pixel full moon -->
  <g>
    <rect x="220" y="130" width="130" height="130" fill="#e9ecf5"/>
    <rect x="208" y="142" width="12" height="106" fill="#e9ecf5"/>
    <rect x="350" y="142" width="12" height="106" fill="#e9ecf5"/>
    <rect x="232" y="118" width="106" height="12" fill="#e9ecf5"/>
    <rect x="232" y="260" width="106" height="12" fill="#e9ecf5"/>
    <!-- craters -->
    <rect x="252" y="160" width="22" height="22" fill="#c8cde0" opacity="0.8"/>
    <rect x="300" y="200" width="18" height="18" fill="#c8cde0" opacity="0.8"/>
    <rect x="268" y="216" width="14" height="14" fill="#c8cde0" opacity="0.7"/>
    <!-- glow -->
    <rect x="196" y="154" width="12" height="82" fill="#f4f6ff" opacity="0.35"/>
    <rect x="362" y="154" width="12" height="82" fill="#f4f6ff" opacity="0.35"/>
  </g>

  <!-- Mountain silhouettes -->
  <g fill="#141a3c">
    <polygon points="0,560 260,330 520,560"/>
    <polygon points="420,560 760,280 1100,560"/>
    <polygon points="980,560 1280,340 1600,560 1600,560"/>
  </g>
  <g fill="#222a55" opacity="0.8">
    <polygon points="200,560 420,400 640,560"/>
    <polygon points="1080,560 1300,410 1520,560"/>
  </g>

  <!-- Terrain, moonlit cool tones -->
  <rect x="0" y="560" width="1600" height="70" fill="#3c6b34"/>
  <rect x="0" y="556" width="1600" height="10" fill="#4d8543"/>
  <g fill="#4d8543">
    <rect x="120" y="548" width="40" height="12"/>
    <rect x="500" y="550" width="36" height="10"/>
    <rect x="980" y="546" width="44" height="14"/>
    <rect x="1380" y="550" width="36" height="10"/>
  </g>

  <rect x="0" y="630" width="1600" height="150" fill="#4a3320"/>
  <g fill="#3a2818" opacity="0.6">
    <rect x="160" y="668" width="70" height="44"/>
    <rect x="520" y="704" width="80" height="50"/>
    <rect x="900" y="654" width="70" height="44"/>
    <rect x="1280" y="700" width="76" height="48"/>
  </g>

  <rect x="0" y="780" width="1600" height="120" fill="#494b54"/>
  <g fill="#3a3c44" opacity="0.6">
    <rect x="140" y="812" width="90" height="54"/>
    <rect x="560" y="844" width="80" height="56"/>
    <rect x="980" y="804" width="100" height="56"/>
    <rect x="1380" y="840" width="96" height="60"/>
  </g>
  <!-- glowing pixel ore in stone -->
  <g>
    <rect x="320" y="824" width="16" height="16" fill="#5fd6e0"/>
    <rect x="760" y="856" width="16" height="16" fill="#e05f8a"/>
    <rect x="1180" y="820" width="16" height="16" fill="#e0c25f"/>
  </g>

  <!-- Tree silhouettes -->
  <g fill="#16331a">
    <rect x="330" y="494" width="24" height="70" fill="#241608"/>
    <rect x="282" y="426" width="120" height="74"/>
    <rect x="304" y="402" width="76" height="30"/>
    <rect x="1224" y="500" width="22" height="64" fill="#241608"/>
    <rect x="1182" y="444" width="108" height="62"/>
    <rect x="1204" y="420" width="66" height="28"/>
  </g>
</svg>
