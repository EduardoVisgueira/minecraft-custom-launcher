<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ba7e0"/>
      <stop offset="45%" stop-color="#79c4ee"/>
      <stop offset="100%" stop-color="#bfe6fb"/>
    </linearGradient>
    <linearGradient id="atmo1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe6fb" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e8f6ff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky1)"/>
  <rect y="540" width="1600" height="200" fill="url(#atmo1)"/>

  <!-- Pixel sun -->
  <g>
    <rect x="1230" y="120" width="120" height="120" fill="#fff3c4"/>
    <rect x="1218" y="132" width="12" height="96" fill="#fff3c4" opacity="0.9"/>
    <rect x="1350" y="132" width="12" height="96" fill="#fff3c4" opacity="0.9"/>
    <rect x="1242" y="108" width="96" height="12" fill="#fff3c4" opacity="0.9"/>
    <rect x="1242" y="240" width="96" height="12" fill="#fff3c4" opacity="0.9"/>
    <rect x="1206" y="144" width="12" height="72" fill="#fff7d8" opacity="0.5"/>
    <rect x="1362" y="144" width="12" height="72" fill="#fff7d8" opacity="0.5"/>
  </g>

  <!-- Blocky clouds -->
  <g fill="#ffffff" opacity="0.92">
    <rect x="180" y="150" width="280" height="44"/>
    <rect x="220" y="118" width="180" height="32"/>
    <rect x="150" y="194" width="200" height="32"/>
    <rect x="760" y="220" width="240" height="40"/>
    <rect x="800" y="192" width="140" height="28"/>
    <rect x="980" y="120" width="200" height="36"/>
  </g>

  <!-- Distant geometric mountains -->
  <g fill="#6fae8e">
    <polygon points="0,560 220,360 440,560"/>
    <polygon points="360,560 620,300 880,560"/>
    <polygon points="780,560 1040,380 1300,560"/>
    <polygon points="1180,560 1420,400 1600,560 1600,560"/>
  </g>
  <g fill="#8ec9a8" opacity="0.6">
    <polygon points="180,560 360,440 540,560"/>
    <polygon points="900,560 1120,430 1340,560"/>
  </g>

  <!-- Layered terrain: grass top -->
  <rect x="0" y="560" width="1600" height="70" fill="#74b94f"/>
  <rect x="0" y="556" width="1600" height="10" fill="#8fd368"/>
  <!-- grass tufts -->
  <g fill="#8fd368">
    <rect x="60" y="548" width="40" height="12"/>
    <rect x="300" y="550" width="36" height="10"/>
    <rect x="560" y="546" width="44" height="14"/>
    <rect x="900" y="550" width="36" height="10"/>
    <rect x="1180" y="548" width="40" height="12"/>
    <rect x="1420" y="550" width="36" height="10"/>
  </g>

  <!-- Dirt layer -->
  <rect x="0" y="630" width="1600" height="150" fill="#8a5a36"/>
  <g fill="#76492a" opacity="0.55">
    <rect x="120" y="660" width="60" height="40"/>
    <rect x="420" y="700" width="80" height="50"/>
    <rect x="760" y="650" width="70" height="44"/>
    <rect x="1080" y="710" width="64" height="40"/>
    <rect x="1340" y="666" width="76" height="48"/>
  </g>
  <g fill="#9d6b44" opacity="0.5">
    <rect x="260" y="710" width="60" height="40"/>
    <rect x="640" y="680" width="64" height="40"/>
    <rect x="1000" y="660" width="60" height="40"/>
    <rect x="1240" y="720" width="70" height="44"/>
  </g>

  <!-- Stone layer -->
  <rect x="0" y="780" width="1600" height="120" fill="#7d7f86"/>
  <g fill="#6a6c72" opacity="0.6">
    <rect x="80" y="810" width="90" height="50"/>
    <rect x="380" y="840" width="80" height="60"/>
    <rect x="700" y="800" width="100" height="56"/>
    <rect x="1040" y="846" width="90" height="54"/>
    <rect x="1360" y="812" width="96" height="58"/>
  </g>

  <!-- Geometric trees -->
  <g>
    <!-- tree 1 -->
    <rect x="430" y="500" width="26" height="64" fill="#6e4525"/>
    <rect x="378" y="430" width="130" height="80" fill="#4f8f3b"/>
    <rect x="402" y="402" width="82" height="36" fill="#5ba348"/>
    <!-- tree 2 -->
    <rect x="1130" y="510" width="22" height="56" fill="#6e4525"/>
    <rect x="1086" y="452" width="112" height="66" fill="#4f8f3b"/>
    <rect x="1108" y="428" width="70" height="30" fill="#5ba348"/>
  </g>
</svg>
